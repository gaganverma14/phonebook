<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhoneBook Management System</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f4f6f9;
    padding: 20px;
}

.container {
    max-width: 1100px;
    margin: auto;
}

h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #222;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    margin-bottom: 20px;
}

.input-group {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    margin-bottom: 15px;
}

input {
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 15px;
}

button {
    padding: 12px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    font-weight: bold;
    transition: 0.3s;
}

.add-btn {
    background: #2563eb;
    color: white;
}

.add-btn:hover {
    background: #1d4ed8;
}

.sort-btn {
    background: #16a34a;
    color: white;
}

.sort-btn:hover {
    background: #15803d;
}

.search-btn {
    background: #9333ea;
    color: white;
}

.search-btn:hover {
    background: #7e22ce;
}

.edit-btn {
    background: #f59e0b;
    color: white;
    margin-right: 5px;
}

.delete-btn {
    background: #dc2626;
    color: white;
}

.table-container {
    overflow-x: auto;
}

.table {
    width: 100%;
    border-collapse: collapse;
}

.table th,
.table td {
    padding: 14px;
    border-bottom: 1px solid #ddd;
    text-align: left;
}

.table th {
    background: #2563eb;
    color: white;
}

.no-data {
    text-align: center;
    padding: 20px;
    color: gray;
}

@media(max-width: 768px) {
    .input-group {
        grid-template-columns: 1fr;
    }
}
</style>
</head>
<body>

<div class="container">

    <h1>PhoneBook Management System</h1>

    <div class="card">

        <div class="input-group">
            <input type="text" id="name" placeholder="Enter Name">
            <input type="text" id="phone" placeholder="Enter Phone Number">
            <input type="email" id="email" placeholder="Enter Email">
        </div>

        <button class="add-btn" onclick="addContact()">Add Contact</button>

    </div>

    <div class="card">

        <div class="input-group">
            <input type="text" id="search" placeholder="Search By Name or Phone">
            <button class="search-btn" onclick="searchContact()">Search Contact</button>
            <button class="sort-btn" onclick="sortContacts()">Sort Contacts</button>
        </div>

    </div>

    <div class="card table-container">

        <table class="table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="contactTable">
            </tbody>
        </table>

        <div class="no-data" id="noData">
            No Contacts Available
        </div>

    </div>

</div>

<script>
let contacts = JSON.parse(localStorage.getItem('contacts')) || [];
let editIndex = -1;

function saveToLocalStorage() {
    localStorage.setItem('contacts', JSON.stringify(contacts));
}

function displayContacts(data = contacts) {

    const table = document.getElementById('contactTable');
    const noData = document.getElementById('noData');

    table.innerHTML = '';

    if (data.length === 0) {
        noData.style.display = 'block';
        return;
    }

    noData.style.display = 'none';

    data.forEach((contact, index) => {

        const row = `
            <tr>
                <td>${contact.name}</td>
                <td>${contact.phone}</td>
                <td>${contact.email}</td>
                <td>
                    <button class="edit-btn" onclick="editContact(${index})">Edit</button>
                    <button class="delete-btn" onclick="deleteContact(${index})">Delete</button>
                </td>
            </tr>
        `;

        table.innerHTML += row;
    });
}

function addContact() {

    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const email = document.getElementById('email').value.trim();

    if (name === '' || phone === '' || email === '') {
        alert('Please fill all fields');
        return;
    }

    const contact = {
        name,
        phone,
        email
    };

    if (editIndex === -1) {
        contacts.push(contact);
        alert('Contact Added Successfully');
    }
    else {
        contacts[editIndex] = contact;
        editIndex = -1;
        alert('Contact Updated Successfully');
    }

    saveToLocalStorage();
    displayContacts();
    clearFields();
}

function clearFields() {
    document.getElementById('name').value = '';
    document.getElementById('phone').value = '';
    document.getElementById('email').value = '';
}

function deleteContact(index) {

    const confirmDelete = confirm('Are you sure you want to delete this contact?');

    if (confirmDelete) {
        contacts.splice(index, 1);
        saveToLocalStorage();
        displayContacts();
    }
}

function editContact(index) {

    const contact = contacts[index];

    document.getElementById('name').value = contact.name;
    document.getElementById('phone').value = contact.phone;
    document.getElementById('email').value = contact.email;

    editIndex = index;
}

function searchContact() {

    const keyword = document.getElementById('search').value.toLowerCase().trim();

    const filteredContacts = contacts.filter(contact =>
        contact.name.toLowerCase().includes(keyword) ||
        contact.phone.includes(keyword)
    );

    displayContacts(filteredContacts);
}

function sortContacts() {

    for (let i = 0; i < contacts.length - 1; i++) {

        for (let j = 0; j < contacts.length - i - 1; j++) {

            if (contacts[j].name.toLowerCase() > contacts[j + 1].name.toLowerCase()) {

                let temp = contacts[j];
                contacts[j] = contacts[j + 1];
                contacts[j + 1] = temp;
            }
        }
    }

    saveToLocalStorage();
    displayContacts();

    alert('Contacts Sorted Successfully');
}

window.onload = function() {
    displayContacts();
}
</script>

</body>
</html>
